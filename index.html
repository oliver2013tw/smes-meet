<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SMES MEET</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ─── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      overflow: hidden; overscroll-behavior: none;
      background: #000; color: #e0e0e0;
      font-family: 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }
    input, button, select { font-family: 'JetBrains Mono', monospace; border-radius: 0 !important; outline: none; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; }

    /* ─── Scanlines ────────────────────────────────────────────── */
    #scanline {
      pointer-events: none; position: fixed; inset: 0; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.035) 2px, rgba(0,0,0,0.035) 4px);
    }

    /* ─── Screen switching ─────────────────────────────────────── */
    .screen { display: none; position: fixed; inset: 0; }
    .screen.active { display: flex; }

    /* ─── Shared primitives ────────────────────────────────────── */
    .tag { display: inline-block; font-size: 10px; padding: 2px 8px; letter-spacing: 1px; }
    .tag-blue  { color: #4499ff; border: 1px solid #0066ff44; }
    .tag-grey  { color: #888;    border: 1px solid #333; }
    .tag-gold  { color: #aa8800; border: 1px solid #664400; }

    /* Toast */
    .toast { font-size: 11px; padding: 9px 12px; display: none; }
    .toast.show { display: block; }
    .toast-error { border: 1px solid #5a0000; background: #1a0000; color: #ff7777; }
    .toast-info  { border: 1px solid #003366; background: #000d1a; color: #55aaff; }

    /* Blink cursor */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: blink 1s step-end infinite; }

    /* Bounce dots */
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

    /* ─── LOADING ──────────────────────────────────────────────── */
    #screen-loading {
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }

    /* ─── LOGIN ────────────────────────────────────────────────── */
    #screen-login { align-items: center; justify-content: center; }
    .login-card {
      width: 100%; max-width: 340px; padding: 0 20px;
    }
    .login-logo { font-size: 26px; font-weight: 700; letter-spacing: 6px; color: #fff; }
    .login-sub  { font-size: 10px; color: #444; margin-top: 4px; letter-spacing: 2px; }
    .login-hr   { height: 1px; background: #1a1a1a; margin: 22px 0; }
    .domain-notice {
      border: 1px solid #1a1a1a; padding: 9px 12px; margin-bottom: 18px;
    }
    .domain-notice .lbl { font-size: 10px; color: #333; margin-bottom: 3px; }
    .domain-notice .val { font-size: 11px; color: #bbb; }

    .btn-google {
      width: 100%; border: 1px solid #222; background: #0a0a0a; color: #ddd;
      padding: 13px 16px; font-size: 12px; letter-spacing: 2px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background .15s, border-color .15s;
    }
    .btn-google:hover:not(:disabled) { background: #0f0f0f; border-color: #333; }
    .btn-google:disabled { opacity: .45; cursor: not-allowed; }

    /* Dev panel */
    .dev-panel { display: none; margin-top: 10px; border: 1px solid #2a1800; background: #080500; padding: 12px; }
    .dev-panel.open { display: block; }
    .dev-lbl { font-size: 10px; color: #664400; margin-bottom: 9px; letter-spacing: 1px; }
    .dev-inp {
      width: 100%; background: #000; border: 1px solid #2a1800; color: #bbb;
      padding: 8px 10px; font-size: 11px; margin-bottom: 7px;
      transition: border-color .15s;
    }
    .dev-inp:focus { border-color: #886600; }
    .btn-dev {
      width: 100%; border: 1px solid #664400; background: transparent; color: #997700;
      padding: 8px; font-size: 11px; cursor: pointer; letter-spacing: 1px;
      transition: background .15s;
    }
    .btn-dev:hover { background: #100800; }
    .ver-text {
      margin-top: 18px; text-align: center; font-size: 10px; color: #1e1e1e;
      cursor: default; user-select: none; letter-spacing: 1px;
    }

    /* HTTPS warning */
    .https-warn {
      border: 1px solid #4a2200; background: #1a0800; color: #ff8844;
      font-size: 10px; padding: 8px 12px; margin-top: 10px; display: none;
    }
    .https-warn.show { display: block; }

    /* ─── LOBBY ────────────────────────────────────────────────── */
    #screen-lobby { align-items: center; justify-content: center; }
    .lobby-card { width: 100%; max-width: 380px; padding: 0 20px; }

    .profile-row {
      border: 1px solid #1a1a1a; padding: 12px 14px; margin-bottom: 18px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .profile-name { font-size: 13px; color: #fff; word-break: break-all; }
    .profile-role { font-size: 10px; margin-top: 4px; }

    .btn-logout {
      border: 1px solid #1a1a1a; background: transparent; color: #444;
      padding: 6px 12px; font-size: 10px; cursor: pointer; letter-spacing: 1px;
      flex-shrink: 0; transition: color .15s, border-color .15s;
    }
    .btn-logout:hover { color: #ff4444; border-color: #4a0000; }

    .room-panel { border: 1px solid #1a1a1a; padding: 16px; margin-bottom: 10px; }
    .room-lbl   { font-size: 10px; color: #333; margin-bottom: 11px; letter-spacing: 1px; }
    .room-row   { display: flex; gap: 8px; }
    .room-inp {
      flex: 1; min-width: 0; background: #000; border: 1px solid #1a1a1a; color: #fff;
      padding: 11px 12px; font-size: 15px; letter-spacing: 5px; text-transform: uppercase;
      transition: border-color .15s;
    }
    .room-inp:focus   { border-color: #0055cc88; }
    .room-inp::placeholder { color: #1e1e1e; letter-spacing: 3px; }
    .btn-enter {
      background: #fff; color: #000; border: none; padding: 11px 18px;
      font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 2px;
      flex-shrink: 0; transition: background .15s;
    }
    .btn-enter:hover { background: #e0e0e0; }

    /* ─── WAITING ──────────────────────────────────────────────── */
    #screen-waiting {
      flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    }
    .wait-code { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 7px; }
    .wait-sub  { font-size: 11px; color: #444; text-align: center; padding: 0 20px; }
    .dots { display: flex; gap: 7px; align-items: center; }
    .dot {
      width: 6px; height: 6px; background: #0066ff;
      animation: bounce .9s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s;  }
    .btn-cancel {
      border: 1px solid #1a1a1a; background: transparent; color: #444;
      padding: 8px 22px; font-size: 11px; cursor: pointer; letter-spacing: 1px;
      margin-top: 4px; transition: color .15s, border-color .15s;
    }
    .btn-cancel:hover { color: #ff4444; border-color: #4a0000; }

    /* ─── MEETING ──────────────────────────────────────────────── */
    #screen-meeting { flex-direction: column; }

    /* Top bar */
    .m-topbar {
      flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px; border-bottom: 1px solid #141414;
      height: 42px; background: #050505; gap: 8px;
    }
    .m-topbar-l { display: flex; align-items: center; gap: 10px; min-width: 0; overflow: hidden; }
    .m-topbar-r { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .m-title    { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 3px; white-space: nowrap; }
    .m-code     { font-size: 10px; color: #3a3a3a; border: 1px solid #1a1a1a; padding: 2px 8px; white-space: nowrap; }
    .m-count    { font-size: 10px; color: #3a3a3a; white-space: nowrap; }

    /* Video grid */
    .video-area {
      flex: 1; min-height: 0;
      display: grid; gap: 2px; padding: 2px;
      background: #0d0d0d;
      /* columns set by JS */
    }
    .video-tile {
      position: relative; background: #080808; overflow: hidden;
      min-width: 0; min-height: 0;
    }
    .video-tile video {
      width: 100%; height: 100%; object-fit: cover;
      display: block; background: #080808;
    }
    .tile-lbl {
      position: absolute; bottom: 6px; left: 6px;
      background: rgba(0,0,0,.8); padding: 2px 8px;
      font-size: 10px; color: #ddd; white-space: nowrap;
    }
    .tile-camoff {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: #080808; font-size: 11px; color: #2a2a2a; letter-spacing: 2px;
    }
    .tile-camoff.hidden { display: none; }

    /* Control bar */
    .m-controls {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px; border-top: 1px solid #141414;
      background: #050505; height: 52px; gap: 8px;
      /* On mobile: wrap into 2 rows */
    }
    .ctrl-l, .ctrl-c, .ctrl-r {
      display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;
    }
    .ctrl-c { flex: 1; justify-content: center; overflow: hidden; }

    /* Control button */
    .cb {
      border: 1px solid #1e1e1e; background: transparent; color: #aaa;
      padding: 7px 11px; font-size: 10px; cursor: pointer; letter-spacing: 1px;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
      transition: all .12s; flex-shrink: 0;
    }
    .cb:hover  { background: #0e0e0e; border-color: #2e2e2e; color: #ddd; }
    .cb.off    { border-color: #4a000066; color: #ff6666; background: #150000; }
    .cb.active { border-color: #00664466; color: #44cc88; background: #001508; }
    .cb.danger { border-color: #4a000099; color: #ff4444; }
    .cb.danger:hover { background: #150000; }

    /* Icon-only on small screens */
    .cb .cb-text { display: inline; }

    /* Pending request cards */
    .req-card {
      border: 1px solid #0066ff33; padding: 4px 9px; font-size: 10px; color: #3388ff;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
      animation: req-pulse 1.6s ease-in-out infinite;
    }
    @keyframes req-pulse { 0%,100%{border-color:#0066ff22} 50%{border-color:#0066ffaa} }
    .btn-approve {
      background: #003399; border: none; color: #fff; padding: 3px 8px;
      font-size: 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
    }
    .btn-approve:hover { background: #0044cc; }
    .btn-reject {
      background: transparent; border: 1px solid #4a000066; color: #ff4444;
      padding: 3px 7px; font-size: 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
    }
    .btn-reject:hover { background: #150000; }

    /* Notification */
    .notif {
      position: fixed; top: 50px; right: 10px; z-index: 1000;
      border: 1px solid #0066ff44; background: #00081a;
      padding: 9px 13px; font-size: 11px; color: #4499ff;
      max-width: 260px; display: none; pointer-events: none;
    }
    .notif.show { display: block; }

    /* ─── RWD ──────────────────────────────────────────────────── */
    /* Tablet and below: hide text labels on control buttons */
    @media (max-width: 640px) {
      .m-controls { height: auto; padding: 8px 10px; flex-wrap: wrap; gap: 6px; }
      .ctrl-l, .ctrl-c, .ctrl-r { gap: 5px; }
      .ctrl-c { flex: 100%; order: 3; justify-content: flex-start; flex-wrap: wrap; }
      .ctrl-r { margin-left: auto; }
      .cb { padding: 8px 10px; }
      /* Show icon, hide text on very small screens */
    }
    @media (max-width: 400px) {
      .cb .cb-text { display: none; }
      .cb { padding: 9px 11px; font-size: 13px; }
      .m-title { letter-spacing: 2px; font-size: 11px; }
    }
  </style>
</head>
<body>
<div id="scanline"></div>

<!-- ══ LOADING ════════════════════════════════════════════════ -->
<div id="screen-loading" class="screen active">
  <div style="font-size:20px;font-weight:700;letter-spacing:6px;color:#fff">SMES_MEET</div>
  <div style="font-size:11px;color:#2a2a2a">初始化中<span class="blink">█</span></div>
</div>

<!-- ══ LOGIN ══════════════════════════════════════════════════ -->
<div id="screen-login" class="screen">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:10px;color:#2a2a2a;letter-spacing:3px;margin-bottom:10px">[ SYSTEM INIT ]</div>
      <div class="login-logo">SMES_MEET</div>
      <div class="login-sub">校園 P2P 視訊會議系統</div>
      <div class="login-hr"></div>
    </div>

    <div class="domain-notice">
      <div class="lbl">// 存取限制</div>
      <div class="val">@mail2.smes.tyc.edu.tw</div>
    </div>

    <!-- HTTPS warning — shown when not on secure context -->
    <div class="https-warn" id="https-warn">
      ⚠ 請使用 HTTPS 存取此頁面。<br/>
      HTTP 環境下相機與螢幕分享功能無法使用。
    </div>

    <div id="login-toast" class="toast toast-error" style="margin-bottom:10px"></div>

    <button class="btn-google" id="btn-google-login">
      <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span>使用 Google 帳號登入</span>
    </button>

    <!-- Dev panel: click version text 5× -->
    <div class="dev-panel" id="dev-panel">
      <div class="dev-lbl">// DEV — 測試帳號登入</div>
      <input class="dev-inp" id="dev-email" type="email"    placeholder="test@mail2.smes.tyc.edu.tw" autocomplete="username"/>
      <input class="dev-inp" id="dev-pw"    type="password" placeholder="密碼" autocomplete="current-password"/>
      <button class="btn-dev" id="btn-dev-login">測試登入</button>
    </div>

    <div class="ver-text" id="ver-text">v3.0 // Pure P2P // No Recording</div>
  </div>
</div>

<!-- ══ LOBBY ═══════════════════════════════════════════════════ -->
<div id="screen-lobby" class="screen">
  <div class="lobby-card">
    <div class="profile-row" id="profile-row">
      <div style="min-width:0">
        <div class="profile-name" id="p-name">—</div>
        <div class="profile-role" id="p-role">—</div>
      </div>
      <button class="btn-logout" id="btn-logout">登出</button>
    </div>

    <div class="room-panel">
      <div class="room-lbl">// 輸入會議代碼</div>
      <div class="room-row">
        <input class="room-inp" id="room-inp" type="text" maxlength="12"
               placeholder="XXXXXXXX" autocomplete="off" spellcheck="false" inputmode="text"/>
        <button class="btn-enter" id="btn-enter">進入</button>
      </div>
    </div>

    <div id="lobby-toast" class="toast toast-error"></div>
    <div style="text-align:center;font-size:10px;color:#1c1c1c;margin-top:14px;letter-spacing:1px">
      純 P2P 加密傳輸 // 無伺服器錄影 // 無時間限制
    </div>
  </div>
</div>

<!-- ══ WAITING ═════════════════════════════════════════════════ -->
<div id="screen-waiting" class="screen">
  <div style="font-size:10px;color:#2a2a2a;letter-spacing:2px">[ PENDING APPROVAL ]</div>
  <div class="wait-code" id="wait-code">——</div>
  <div class="wait-sub">正在等待主持人核准加入請求...</div>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <button class="btn-cancel" id="btn-cancel">取消請求</button>
</div>

<!-- ══ MEETING ══════════════════════════════════════════════════ -->
<div id="screen-meeting" class="screen">

  <!-- Top bar -->
  <div class="m-topbar">
    <div class="m-topbar-l">
      <span class="m-title">SMES_MEET</span>
      <span class="m-code"  id="m-code">—</span>
      <span class="m-count" id="m-count">1 人</span>
    </div>
    <div class="m-topbar-r">
      <span class="tag tag-blue" id="tag-host" style="display:none">HOST</span>
      <span class="tag" id="tag-role"></span>
    </div>
  </div>

  <!-- Video area -->
  <div class="video-area" id="vgrid">
    <div class="video-tile" id="tile-local">
      <video id="local-vid" autoplay muted playsinline></video>
      <div class="tile-camoff hidden" id="local-camoff">CAM_OFF</div>
      <div class="tile-lbl" id="local-lbl">나</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="m-controls">
    <div class="ctrl-l">
      <button class="cb" id="cb-mic">🎤 <span class="cb-text">麥克風</span></button>
      <button class="cb" id="cb-cam">📷 <span class="cb-text">相機</span></button>
      <button class="cb" id="cb-share">🖥 <span class="cb-text">分享螢幕</span></button>
    </div>
    <div class="ctrl-c" id="pending-strip"></div>
    <div class="ctrl-r">
      <button class="cb danger" id="cb-leave" style="display:none">✕ <span class="cb-text">離開</span></button>
      <button class="cb danger" id="cb-end"   style="display:none">⏹ <span class="cb-text">結束會議</span></button>
    </div>
  </div>
</div>

<!-- Notification -->
<div class="notif" id="notif"></div>

<!-- ════════════════ APP LOGIC ════════════════════════════════ -->
<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth, GoogleAuthProvider,
  signInWithPopup,
  signInWithEmailAndPassword, signOut, onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, doc, getDoc, setDoc,
  collection, addDoc, updateDoc, deleteDoc,
  onSnapshot, query, where, serverTimestamp, getDocs
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import {
  getDatabase, ref as rtRef,
  set as rtSet, remove as rtRemove,
  push as rtPush, onValue, onChildAdded
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── Config ────────────────────────────────────────────────────
const CFG = {
  apiKey:            'AIzaSyC_j0PxmMBNAtGtFotdFe8WjHQj0K8pwO8',
  authDomain:        'smes-meet.firebaseapp.com',
  projectId:         'smes-meet',
  storageBucket:     'smes-meet.firebasestorage.app',
  messagingSenderId: '897771756747',
  appId:             '1:897771756747:web:4a227140a386cef3860f4e',
  databaseURL:       'https://smes-meet-default-rtdb.asia-southeast1.firebasedatabase.app'
};
const DOMAIN = 'mail2.smes.tyc.edu.tw';
const STU_RE = /^(\d{3})0(\d{1,3})@mail2\.smes\.tyc\.edu\.tw$/;
const ICE_CFG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302'  },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun.services.mozilla.com'}
  ]
};

// ── Firebase init ─────────────────────────────────────────────
const fbApp = initializeApp(CFG);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);
const rtdb  = getDatabase(fbApp);

// ── App state ─────────────────────────────────────────────────
const S = {
  user: null, profile: null,
  roomCode: '', isHost: false,
  localStream: null, screenStream: null,
  micOn: true, camOn: true, sharing: false,
  peers: {},       // uid → { pc, name, role }
  myReqId: null,
  unsubReqs: null,
  waitUnsub: null,
  authReady: false,
};

// ── DOM helpers ───────────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function detectRole(email) {
  const m = email.match(STU_RE);
  return (m && parseInt(m[2], 10) <= 180) ? 'student' : 'teacher';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $('screen-' + id).classList.add('active');
}
function toast(elId, msg, type = 'error') {
  const el = $(elId); if (!el) return;
  el.textContent = msg;
  el.className = `toast toast-${type} show`;
  if (type !== 'info') setTimeout(() => el.classList.remove('show'), 6000);
}
function clearToast(elId) { const el=$(elId); if(el) el.classList.remove('show'); }
function showNotif(msg, ms = 4000) {
  const el = $('notif');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

// ── HTTPS check ───────────────────────────────────────────────
// mediaDevices APIs (camera, mic, screen share) require a secure context.
function isSecureContext() {
  return window.isSecureContext || location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
}
if (!isSecureContext()) {
  $('https-warn').classList.add('show');
}

// ── Auth ──────────────────────────────────────────────────────

// Auth state observer — simple, no redirect complexity
onAuthStateChanged(auth, async user => {
  if (user) {
    if (!user.email.endsWith('@' + DOMAIN)) {
      await signOut(auth);
      toast('login-toast', '僅允許 @' + DOMAIN + ' 帳號');
      showScreen('login');
      return;
    }
    S.user = user;
    S.profile = await ensureProfile(user);
    renderLobby();
    showScreen('lobby');
  } else {
    S.user = null; S.profile = null;
    showScreen('login');
  }
});

// Google login — uses popup (works on GitHub Pages, no domain restrictions)
$('btn-google-login').onclick = async () => {
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({
    hd: DOMAIN,
    login_hint: '@' + DOMAIN,
    prompt: 'select_account'
  });
  const btn = $('btn-google-login');
  btn.querySelector('span').textContent = '登入中...';
  btn.disabled = true;
  try {
    const result = await signInWithPopup(auth, provider);
    if (!result.user.email.endsWith('@' + DOMAIN)) {
      await signOut(auth);
      toast('login-toast', '存取被拒：僅允許 @' + DOMAIN);
    }
    // onAuthStateChanged will handle navigation
  } catch (e) {
    btn.querySelector('span').textContent = '使用 Google 帳號登入';
    btn.disabled = false;
    if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
      toast('login-toast', '登入失敗：' + e.message);
    }
  }
};

// Dev panel toggle (click version text 5×)
let _vc = 0;
$('ver-text').onclick = () => {
  if (++_vc >= 5) { _vc = 0; $('dev-panel').classList.toggle('open'); }
};
$('btn-dev-login').onclick = devLogin;
$('dev-pw').onkeydown = e => { if (e.key === 'Enter') devLogin(); };

async function devLogin() {
  const email = $('dev-email').value.trim();
  const pw    = $('dev-pw').value;
  if (!email || !pw) { toast('login-toast', '請輸入 Email 和密碼'); return; }
  if (!email.endsWith('@' + DOMAIN)) { toast('login-toast', '測試帳號也必須使用 @' + DOMAIN); return; }
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch (e) {
    const msg = e.code === 'auth/invalid-credential' ? '帳號或密碼錯誤'
      : e.code === 'auth/user-not-found'             ? '帳號不存在，請先在 Firebase Console 建立'
      : e.message;
    toast('login-toast', msg);
  }
}

$('btn-logout').onclick = async () => {
  await cleanup();
  await signOut(auth);
};

async function ensureProfile(user) {
  const ref2 = doc(db, 'profiles', user.uid);
  const snap = await getDoc(ref2);
  if (snap.exists()) return snap.data();
  const p = {
    uid: user.uid, email: user.email,
    full_name: user.displayName || user.email.split('@')[0],
    role: detectRole(user.email)
  };
  await setDoc(ref2, p);
  return p;
}

// ── Lobby ─────────────────────────────────────────────────────
function renderLobby() {
  const p = S.profile;
  $('p-name').textContent = p.full_name || p.email;
  const rEl = $('p-role');
  if (p.role === 'teacher') {
    rEl.textContent = '[TEACHER]';
    rEl.className = 'profile-role tag-blue';
    $('profile-row').style.borderColor = '#0066ff33';
    $('profile-row').style.boxShadow   = '0 0 0 1px #0066ff11';
  } else {
    rEl.textContent = '[STUDENT]';
    rEl.className = 'profile-role tag-grey';
    $('profile-row').style.borderColor = '#1a1a1a';
    $('profile-row').style.boxShadow   = 'none';
  }
}

$('room-inp').oninput   = function () { this.value = this.value.toUpperCase(); };
$('room-inp').onkeydown = e => { if (e.key === 'Enter') enterRoom(); };
$('btn-enter').onclick  = enterRoom;

async function enterRoom() {
  clearToast('lobby-toast');
  const code = $('room-inp').value.trim().toUpperCase();
  if (!code) { toast('lobby-toast', '請輸入會議代碼'); return; }

  let snap;
  try { snap = await getDoc(doc(db, 'rooms', code)); }
  catch (e) { toast('lobby-toast', '查詢失敗：' + e.message); return; }

  if (!snap.exists()) {
    // Room doesn't exist
    if (S.profile.role !== 'teacher') {
      toast('lobby-toast', '會議室不存在。僅有教師具備建立新會議的權限。');
      return;
    }
    if (!confirm(`會議室「${code}」尚未建立，是否建立新會議？`)) return;
    try {
      await setDoc(doc(db, 'rooms', code), {
        code, host_id: S.user.uid, created_at: serverTimestamp()
      });
    } catch (e) { toast('lobby-toast', '建立失敗：' + e.message); return; }
    S.roomCode = code; S.isHost = true;
    await goMeeting();
    return;
  }

  // Room exists — is this user the host?
  const rd = snap.data();
  if (rd.host_id === S.user.uid) {
    S.roomCode = code; S.isHost = true;
    await goMeeting();
    return;
  }

  // Everyone else must request to join
  if (!confirm(`會議室「${code}」已開啟，是否送出加入要求？`)) return;
  let reqRef;
  try {
    reqRef = await addDoc(collection(db, 'room_requests'), {
      room_code: code, user_id: S.user.uid,
      user_name: S.profile.full_name, user_role: S.profile.role,
      user_email: S.profile.email,
      status: 'pending', created_at: serverTimestamp()
    });
  } catch (e) { toast('lobby-toast', '送出請求失敗：' + e.message); return; }

  S.myReqId = reqRef.id; S.roomCode = code;
  $('wait-code').textContent = code;
  showScreen('waiting');

  S.waitUnsub = onSnapshot(doc(db, 'room_requests', reqRef.id), snap2 => {
    if (!snap2.exists()) return;
    const d = snap2.data();
    if (d.status === 'approved') {
      S.waitUnsub?.(); S.waitUnsub = null; S.myReqId = null; S.isHost = false;
      goMeeting();
    } else if (d.status === 'rejected') {
      S.waitUnsub?.(); S.waitUnsub = null; S.myReqId = null; S.roomCode = '';
      toast('lobby-toast', '主持人已拒絕您的加入請求。');
      showScreen('lobby');
    }
  });
}

$('btn-cancel').onclick = async () => {
  S.waitUnsub?.(); S.waitUnsub = null;
  if (S.myReqId) {
    await deleteDoc(doc(db, 'room_requests', S.myReqId)).catch(() => {});
    S.myReqId = null;
  }
  S.roomCode = '';
  showScreen('lobby');
};

// ── Enter meeting ─────────────────────────────────────────────
async function goMeeting() {
  if (!isSecureContext()) {
    toast('lobby-toast', '請使用 HTTPS 才能存取相機/麥克風。', 'error');
    // Still allow entering but without media
    S.localStream = new MediaStream(); S.camOn = false; S.micOn = false;
  } else {
    try {
      S.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      S.camOn = true; S.micOn = true;
    } catch (e) {
      try {
        S.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        S.camOn = false; S.micOn = true;
      } catch (e2) {
        S.localStream = new MediaStream(); S.camOn = false; S.micOn = false;
      }
    }
  }

  // Setup UI
  $('m-code').textContent = S.roomCode;
  $('tag-host').style.display = S.isHost ? 'inline' : 'none';
  $('cb-end').style.display   = S.isHost ? 'inline-flex' : 'none';
  $('cb-leave').style.display = S.isHost ? 'none'        : 'inline-flex';

  const rEl = $('tag-role');
  if (S.profile.role === 'teacher') {
    rEl.textContent = '[T]'; rEl.className = 'tag tag-blue';
  } else {
    rEl.textContent = '[S]'; rEl.className = 'tag tag-grey';
  }

  $('local-vid').srcObject = S.localStream;
  $('local-lbl').textContent = (S.profile.full_name || '나') + (S.isHost ? ' [HOST]' : '');
  updateCamOff(); updateCtrlBtns(); updateGrid();

  showScreen('meeting');

  if (S.isHost) listenRequests();
  else          listenOffer();
}

// ── Media controls ────────────────────────────────────────────
$('cb-mic').onclick = () => {
  S.micOn = !S.micOn;
  S.localStream?.getAudioTracks().forEach(t => t.enabled = S.micOn);
  updateCtrlBtns();
};
$('cb-cam').onclick = () => {
  S.camOn = !S.camOn;
  S.localStream?.getVideoTracks().forEach(t => t.enabled = S.camOn);
  updateCamOff(); updateCtrlBtns();
};
$('cb-share').onclick = toggleShare;

async function toggleShare() {
  // ── Stop sharing ──
  if (S.sharing) {
    S.screenStream?.getTracks().forEach(t => t.stop());
    S.screenStream = null; S.sharing = false;
    const camT = S.localStream?.getVideoTracks()[0];
    Object.values(S.peers).forEach(p => {
      const s = p.pc.getSenders().find(s => s.track?.kind === 'video');
      if (s && camT) s.replaceTrack(camT).catch(() => {});
    });
    $('local-vid').srcObject = S.localStream;
    updateCtrlBtns(); return;
  }

  // ── Security check ──
  if (!isSecureContext()) {
    showNotif('⚠ 螢幕分享需要 HTTPS 環境。', 5000); return;
  }
  // getDisplayMedia requires a secure context AND exists on mediaDevices
  if (!navigator.mediaDevices || typeof navigator.mediaDevices.getDisplayMedia !== 'function') {
    showNotif('⚠ 此瀏覽器不支援螢幕分享，請使用 Chrome / Edge。', 5000); return;
  }

  try {
    // Minimal constraints — Chrome requires NO sub-constraints on audio for getDisplayMedia.
    // audio:true triggers Chrome's native "Share system audio" checkbox automatically.
    S.screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: true,
      audio: true
    });

    const vTrack = S.screenStream.getVideoTracks()[0];
    // aTrack exists only if the user ticked "Share system audio" in Chrome's picker
    const aTrack = S.screenStream.getAudioTracks()[0] || null;
    S.sharing = true;

    // Replace video track on all peer connections
    Object.values(S.peers).forEach(p => {
      const vs = p.pc.getSenders().find(s => s.track?.kind === 'video');
      if (vs) vs.replaceTrack(vTrack).catch(() => {});
      if (aTrack) {
        const as2 = p.pc.getSenders().find(s => s.track?.kind === 'audio');
        if (as2) as2.replaceTrack(aTrack).catch(() => {});
        else p.pc.addTrack(aTrack, S.screenStream);
      }
    });

    // Local preview
    const preview = new MediaStream([vTrack]);
    if (aTrack) preview.addTrack(aTrack);
    $('local-vid').srcObject = preview;

    // When user clicks Chrome's "Stop sharing" button
    vTrack.onended = () => { if (S.sharing) toggleShare(); };

    updateCtrlBtns();
  } catch (e) {
    S.sharing = false;
    // NotAllowedError = user cancelled picker — not a real error
    if (e.name !== 'NotAllowedError') {
      showNotif('螢幕分享失敗：' + e.name + ' ' + e.message, 6000);
    }
  }
}

function updateCtrlBtns() {
  const mic = $('cb-mic'), cam = $('cb-cam'), sh = $('cb-share');
  mic.className = 'cb' + (S.micOn ? '' : ' off');
  mic.innerHTML = S.micOn ? '🎤 <span class="cb-text">麥克風</span>' : '🔇 <span class="cb-text">靜音中</span>';
  cam.className = 'cb' + (S.camOn ? '' : ' off');
  cam.innerHTML = S.camOn ? '📷 <span class="cb-text">相機</span>'   : '📷 <span class="cb-text">相機關閉</span>';
  sh.className  = 'cb' + (S.sharing ? ' active' : '');
  sh.innerHTML  = S.sharing ? '⏹ <span class="cb-text">停止分享</span>' : '🖥 <span class="cb-text">分享螢幕</span>';
}
function updateCamOff() {
  $('local-camoff').classList.toggle('hidden', S.camOn);
}

// ── Leave / End ───────────────────────────────────────────────
$('cb-leave').onclick = () => leaveMeeting(false);
$('cb-end').onclick   = () => {
  if (confirm('確定要結束會議？所有參與者都將被中斷連線。')) leaveMeeting(true);
};

async function leaveMeeting(endAll) {
  await cleanup(endAll);
  // Reset grid: remove all remote tiles
  const grid = $('vgrid');
  [...grid.children].forEach(c => { if (c.id !== 'tile-local') c.remove(); });
  $('local-vid').srcObject = null;
  $('local-camoff').classList.add('hidden');
  $('pending-strip').innerHTML = '';
  updateGrid();
  renderLobby(); showScreen('lobby');
}

async function cleanup(endAll = false) {
  Object.values(S.peers).forEach(p => p.pc.close()); S.peers = {};
  S.localStream?.getTracks().forEach(t => t.stop());  S.localStream = null;
  S.screenStream?.getTracks().forEach(t => t.stop()); S.screenStream = null;
  S.sharing = false; S.camOn = true; S.micOn = true;
  S.unsubReqs?.(); S.unsubReqs = null;
  S.waitUnsub?.(); S.waitUnsub = null;
  rtRemove(rtRef(rtdb, `signaling/${S.roomCode}`)).catch(() => {});

  if (endAll && S.isHost) {
    const q = query(
      collection(db, 'room_requests'),
      where('room_code', '==', S.roomCode),
      where('status', '==', 'pending')
    );
    const sn = await getDocs(q).catch(() => ({ docs: [] }));
    sn.docs.forEach(d => updateDoc(d.ref, { status: 'rejected' }).catch(() => {}));
    await deleteDoc(doc(db, 'rooms', S.roomCode)).catch(() => {});
  }
  if (S.myReqId) {
    deleteDoc(doc(db, 'room_requests', S.myReqId)).catch(() => {});
    S.myReqId = null;
  }
  S.roomCode = ''; S.isHost = false;
}

// ── Host: listen for join requests ────────────────────────────
function listenRequests() {
  const q = query(
    collection(db, 'room_requests'),
    where('room_code', '==', S.roomCode),
    where('status', '==', 'pending')
  );
  S.unsubReqs = onSnapshot(q, snap => {
    const strip = $('pending-strip');
    strip.innerHTML = '';
    snap.docs.forEach(d => {
      const r = d.data();
      const card = document.createElement('div');
      card.className = 'req-card';
      card.innerHTML =
        `<span>[${r.user_role === 'teacher' ? 'T' : 'S'}] ${esc(r.user_name || r.user_email)}</span>
         <button class="btn-approve" data-id="${d.id}" data-uid="${r.user_id}"
           data-name="${esc(r.user_name)}" data-role="${r.user_role}">核准</button>
         <button class="btn-reject"  data-id="${d.id}">拒絕</button>`;
      strip.appendChild(card);
    });
    strip.querySelectorAll('.btn-approve').forEach(b => b.onclick = () =>
      approveReq(b.dataset.id, b.dataset.uid, b.dataset.name, b.dataset.role));
    strip.querySelectorAll('.btn-reject').forEach(b => b.onclick = () =>
      updateDoc(doc(db, 'room_requests', b.dataset.id), { status: 'rejected' }));
    // Notification for new entries
    snap.docChanges().filter(c => c.type === 'added').forEach(c => {
      const r = c.doc.data();
      showNotif(`[${r.user_role === 'teacher' ? 'TEACHER' : 'STUDENT'}] ${r.user_name} 申請加入`);
    });
  });
}

async function approveReq(reqId, uid, name, role2) {
  await updateDoc(doc(db, 'room_requests', reqId), { status: 'approved' });
  await initP2P(uid, name, role2);
}

// ── WebRTC: Host initiates ────────────────────────────────────
async function initP2P(guestUid, guestName, guestRole) {
  const pc = buildPC(guestUid);
  S.peers[guestUid] = { pc, name: guestName, role: guestRole };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await rtSet(rtRef(rtdb, `signaling/${S.roomCode}/offer/${guestUid}`), {
    sdp: offer.sdp, type: offer.type, from: S.user.uid
  });

  // Listen for answer
  onValue(rtRef(rtdb, `signaling/${S.roomCode}/answer/${S.user.uid}`), async snap => {
    if (!snap.exists()) return;
    const a = snap.val();
    if (a.from !== guestUid) return;
    if (pc.signalingState === 'have-local-offer') {
      await pc.setRemoteDescription(new RTCSessionDescription(a)).catch(() => {});
    }
  });

  // ICE from guest
  onChildAdded(rtRef(rtdb, `signaling/${S.roomCode}/ice/${S.user.uid}_from_${guestUid}`), async snap => {
    if (snap.exists()) await pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(() => {});
  });

  addTile(guestUid, guestName, guestRole);
}

// ── WebRTC: Guest listens for offer ──────────────────────────
function listenOffer() {
  onValue(rtRef(rtdb, `signaling/${S.roomCode}/offer/${S.user.uid}`), async snap => {
    if (!snap.exists()) return;
    const od = snap.val(); const hostUid = od.from;

    let hostName = 'Host', hostRole = 'teacher';
    const hs = await getDoc(doc(db, 'profiles', hostUid)).catch(() => null);
    if (hs?.exists()) { hostName = hs.data().full_name || 'Host'; hostRole = hs.data().role; }

    const pc = buildPC(hostUid);
    S.peers[hostUid] = { pc, name: hostName, role: hostRole };

    await pc.setRemoteDescription(new RTCSessionDescription(od)).catch(() => {});
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);

    await rtSet(rtRef(rtdb, `signaling/${S.roomCode}/answer/${hostUid}`), {
      sdp: ans.sdp, type: ans.type, from: S.user.uid
    });

    // ICE from host
    onChildAdded(rtRef(rtdb, `signaling/${S.roomCode}/ice/${S.user.uid}_from_${hostUid}`), async snap2 => {
      if (snap2.exists()) await pc.addIceCandidate(new RTCIceCandidate(snap2.val())).catch(() => {});
    });

    addTile(hostUid, hostName, hostRole);
  });
}

// ── Build RTCPeerConnection ───────────────────────────────────
function buildPC(remoteUid) {
  const pc = new RTCPeerConnection(ICE_CFG);

  // Add current local tracks
  if (S.localStream) S.localStream.getTracks().forEach(t => pc.addTrack(t, S.localStream));

  // Remote stream
  const rs = new MediaStream();
  pc.ontrack = e => {
    rs.addTrack(e.track);
    const v = $(`vid-${remoteUid}`);
    if (v) v.srcObject = rs;
  };

  // ICE
  pc.onicecandidate = e => {
    if (!e.candidate) return;
    rtPush(rtRef(rtdb, `signaling/${S.roomCode}/ice/${remoteUid}_from_${S.user.uid}`), e.candidate.toJSON());
  };

  // Connection state
  pc.onconnectionstatechange = () => {
    if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
      removeTile(remoteUid);
    }
  };
  return pc;
}

// ── Video grid ────────────────────────────────────────────────
function addTile(uid, name, role2) {
  const grid = $('vgrid');
  const tile = document.createElement('div');
  tile.className = 'video-tile'; tile.id = `tile-${uid}`;
  tile.innerHTML =
    `<video id="vid-${uid}" autoplay playsinline></video>
     <div class="tile-lbl">${esc(name)} [${role2 === 'teacher' ? 'T' : 'S'}]</div>`;
  grid.appendChild(tile);
  updateGrid(); updateCount();
}
function removeTile(uid) {
  S.peers[uid]?.pc.close(); delete S.peers[uid];
  $(`tile-${uid}`)?.remove();
  updateGrid(); updateCount();
}
function updateGrid() {
  const grid = $('vgrid');
  const n = Object.keys(S.peers).length + 1;
  // Responsive column count
  const cols = n <= 1 ? 1 : n <= 2 ? 2 : n <= 4 ? 2 : n <= 6 ? 3 : 4;
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
}
function updateCount() {
  $('m-count').textContent = (Object.keys(S.peers).length + 1) + ' 人';
}
</script>
