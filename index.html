<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>SMES-MEET</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════
   RESET & DESIGN TOKENS
════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:    #000; --bg1: #0a0a0a; --bg2: #111; --bg3: #1a1a1a;
  --b:     #1e1e1e; --b2: #2a2a2a;
  --t:     #e2e2e2; --t2: #888; --t3: #444;
  --blue:  #2979ff; --red:  #ff5252; --green: #00e676;
  --font:  'JetBrains Mono', monospace;
  --r:     0px; 
  --glass: rgba(10,10,10,0.7);
}
html,body{
  height: 100dvh; width: 100%; overflow: hidden;
  overscroll-behavior: none; background: var(--bg); color: var(--t);
  font-family: var(--font); font-size: 13px;
  -webkit-font-smoothing: antialiased;
}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;outline:none;border:none;background:none}

/* ════════════════════════════════════════════════
   LAYOUT & GRID SYSTEM
════════════════════════════════════════════════ */
.screen{display:none;width:100%;height:100%;flex-direction:column;position:relative}
.screen.active{display:flex}

.video-area {
  flex: 1; min-height: 0; display: grid; gap: 2px;
  background: var(--bg2); padding: 2px;
  place-content: center; /* 確保少人數時依然置中 */
}
.video-tile {
  position: relative; background: var(--bg1); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.video-tile video { width: 100%; height: 100%; object-fit: cover; background: #000; }
.video-tile .info {
  position: absolute; bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.5); padding: 4px 8px;
  backdrop-filter: blur(8px); pointer-events: none;
  font-size: 11px; z-index: 2; border: 1px solid var(--b);
}
.video-tile[data-mic-off="true"] .mic-off { display: block; }
.mic-off { position: absolute; top: 8px; right: 8px; color: var(--red); display: none; z-index: 2; }

/* ════════════════════════════════════════════════
   CONTROLS (Glassmorphism)
════════════════════════════════════════════════ */
.ctrl-bar {
  height: 64px; background: var(--glass);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; border-top: 1px solid var(--b); z-index: 100;
}
.ctrl-grp { display: flex; align-items: center; gap: 8px; }
.btn-icon {
  width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; border: 1px solid transparent;
  transition: all .2s;
}
.btn-icon:hover { background: var(--b); }
.btn-icon.active { color: var(--blue); border-color: var(--blue); }
.btn-icon.off { color: var(--red); }
.btn-icon svg { width: 20px; height: 20px; stroke-width: 1.5; fill: none; stroke: currentColor; }

.leave-btn { 
  background: var(--red); color: #fff; width: 64px; height: 36px; 
  display: flex; align-items: center; justify-content: center; 
  font-weight: 600; cursor: pointer; letter-spacing: 1px;
}

/* ════════════════════════════════════════════════
   SIDEBARS
════════════════════════════════════════════════ */
.m-bar {
  position: absolute; top: 0; right: 0; bottom: 0; width: 320px;
  background: var(--glass); backdrop-filter: blur(24px);
  border-left: 1px solid var(--b); transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; flex-direction: column; z-index: 200;
}
.m-bar.open { transform: translateX(0); }
.m-head { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--b); }
.m-body { flex: 1; overflow-y: auto; padding: 16px; }

/* ════════════════════════════════════════════════
   UI COMPONENTS
════════════════════════════════════════════════ */
.login-box { width: 320px; padding: 32px; background: var(--bg1); border: 1px solid var(--b); text-align: center; }
.input-field { width: 100%; height: 44px; background: var(--bg2); border: 1px solid var(--b); padding: 0 12px; margin-bottom: 12px; color: var(--t); }
.input-field:focus { border-color: var(--blue); }
.btn-main { width: 100%; height: 44px; background: var(--blue); color: #fff; font-weight: 600; cursor: pointer; }
.btn-main:disabled { opacity: 0.5; }

.dot { width: 6px; height: 6px; background: var(--blue); border-radius: 0px !important; animation: bounce .9s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* Chat Bubbles */
.chat-msg { margin-bottom: 12px; max-width: 90%; }
.chat-msg .name { font-size: 11px; color: var(--t2); margin-bottom: 2px; }
.chat-msg .text { background: var(--bg3); padding: 8px 12px; line-height: 1.4; word-break: break-all; border-left: 2px solid var(--b2); }
.chat-msg.me { align-self: flex-end; margin-left: auto; }
.chat-msg.me .text { background: var(--blue); color: #fff; border-left: none; border-right: 2px solid rgba(255,255,255,0.3); }

</style>
</head>
<body>

<div id="s-loading" class="screen active" style="align-items:center;justify-content:center">
  <div style="display:flex;gap:6px">
    <div class="dot"></div>
    <div class="dot" style="animation-delay:0.2s"></div>
    <div class="dot" style="animation-delay:0.4s"></div>
  </div>
</div>

<div id="s-login" class="screen" style="align-items:center;justify-content:center">
  <div class="login-box">
    <h2 style="margin-bottom:24px;letter-spacing:4px">SMES-MEET</h2>
    <input type="text" id="i-name" class="input-field" placeholder="您的姓名" maxlength="20"/>
    <button id="btn-login" class="btn-main">登入</button>
  </div>
</div>

<div id="s-lobby" class="screen" style="padding:40px">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <h1 id="lobby-time" style="font-size:32px;margin-bottom:4px;font-weight:300">00:00:00</h1>
      <div id="user-info" style="color:var(--t2)">載入中...</div>
    </div>
    <button onclick="signOut()" style="color:var(--t2);text-decoration:underline">登出</button>
  </div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center">
    <div style="width:320px;text-align:center">
      <input type="text" id="i-code" class="input-field" placeholder="房間代碼" maxlength="10" style="text-align:center;font-size:20px;text-transform:uppercase;letter-spacing:2px"/>
      <button id="btn-join" class="btn-main">進入會議</button>
    </div>
  </div>
</div>

<div id="s-meeting" class="screen">
  <div id="vgrid" class="video-area"></div>
  
  <div class="ctrl-bar">
    <div class="ctrl-grp">
      <div id="btn-cam" class="btn-icon"><svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14"/></svg></div>
      <div id="btn-mic" class="btn-icon"><svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg></div>
    </div>
    
    <div class="ctrl-grp">
      <div id="btn-chat-toggle" class="btn-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
      <div id="btn-set-toggle" class="btn-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
      <div onclick="leaveRoom()" class="leave-btn">LEAVE</div>
    </div>
  </div>

  <div id="m-chat" class="m-bar">
    <div class="m-head"><span>聊天室</span><button onclick="toggleBar('chat')" style="cursor:pointer">✕</button></div>
    <div id="chat-list" class="m-body" style="display:flex;flex-direction:column"></div>
    <div style="padding:12px;border-top:1px solid var(--b)">
      <input type="text" id="i-chat" class="input-field" style="margin:0" placeholder="輸入訊息..." autocomplete="off"/>
    </div>
  </div>

  <div id="m-set" class="m-bar">
    <div class="m-head"><span>設定</span><button onclick="toggleBar('set')" style="cursor:pointer">✕</button></div>
    <div class="m-body">
      <div style="margin-bottom:24px">
        <label style="display:block;margin-bottom:8px;color:var(--t2)">視訊品質</label>
        <select id="sel-quality" class="input-field">
          <option value="qvga">320x180 (Low)</option>
          <option value="vga">640x360 (Standard)</option>
          <option value="hd" selected>1280x720 (HD)</option>
        </select>
      </div>
      <div id="conn-info" style="font-size:11px;color:var(--t3);line-height:1.8"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/livekit-client@1.13.0/dist/livekit-client.umd.min.js"></script>

<script>
/**
 * SMES-MEET CONFIG & CORE
 */
const { Room, RoomEvent, Track, VideoPresets } = LiveKitClient;

// 已恢復你原始檔案中的 Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyCX8BInVq5iN93vLpC0-j26f_M3F4f4-5U",
  authDomain: "smes-meet.firebaseapp.com",
  projectId: "smes-meet",
  storageBucket: "smes-meet.appspot.com",
  messagingSenderId: "596162391696",
  appId: "1:596162391696:web:6f45c26b6f008f36611388"
};

// 已恢復你原始檔案中的 LiveKit 設定
const LIVEKIT_URL = "wss://smes-meet-656363w1.livekit.cloud";
const TOKEN_URL = "https://smes-meet-token-generator.zeabur.app/get-token";

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const $ = id => document.getElementById(id);
const esc = t => String(t).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let S = { user: null, inMeeting: false, roomCode: '', _unread: 0 };
let lkRoom = null;

// Auth
auth.onAuthStateChanged(user => {
  if(user){
    S.user = user;
    $('user-info').textContent = `${user.displayName || '使用者'} (${user.email})`;
    showScreen('lobby');
  } else {
    showScreen('login');
  }
});

$('btn-login').onclick = () => {
  const name = $('i-name').value.trim();
  if(!name) return alert('請輸入姓名');
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).then(res => {
    res.user.updateProfile({ displayName: name });
  }).catch(e => alert(e.message));
};

function signOut(){ auth.signOut(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(`s-${id}`).classList.add('active');
  const titles = { login:'SMES-MEET', lobby:'SMES-MEET', meeting: `SMES-MEET — ${S.roomCode}` };
  document.title = titles[id] || 'SMES-MEET';
}

// Room Logic
$('btn-join').onclick = () => enterRoom();
$('i-code').onkeyup = e => { if(e.key==='Enter') enterRoom(); };

async function enterRoom() {
  const code = $('i-code').value.trim().toUpperCase();
  if(!code) return;
  S.roomCode = code;
  showScreen('meeting');
  await initLiveKit(code);
}

async function initLiveKit(roomName) {
  try {
    const res = await fetch(`${TOKEN_URL}?room=${roomName}&identity=${encodeURIComponent(S.user.displayName)}`);
    const { token } = await res.json();

    lkRoom = new Room({ adaptiveStream: true, dynacast: true });
    
    lkRoom.on(RoomEvent.TrackSubscribed, (track, pub, p) => {
      if (track.kind === Track.Kind.Video) appendVideo(p, track);
    });

    lkRoom.on(RoomEvent.TrackUnsubscribed, (track, pub, p) => {
      if (track.kind === Track.Kind.Video) {
        $(`v-${p.sid}`)?.remove();
        updateGrid();
      }
    });

    lkRoom.on(RoomEvent.ParticipantConnected, () => updateGrid());
    lkRoom.on(RoomEvent.ParticipantDisconnected, () => updateGrid());
    lkRoom.on(RoomEvent.DataReceived, (payload, p) => {
      const txt = new TextDecoder().decode(payload);
      appendChat(p ? p.identity : '系統', txt, false);
    });

    await lkRoom.connect(LIVEKIT_URL, token);
    S.inMeeting = true;
    
    const videoTrack = await LiveKitClient.createLocalVideoTrack({ resolution: VideoPresets.h720 });
    const audioTrack = await LiveKitClient.createLocalAudioTrack();
    await lkRoom.localParticipant.publishTrack(videoTrack);
    await lkRoom.localParticipant.publishTrack(audioTrack);
    
    appendVideo(lkRoom.localParticipant);
    updateGrid();
  } catch (e) {
    alert('連線失敗: ' + e.message);
    leaveRoom();
  }
}

function appendVideo(p, track) {
  let container = $(`v-${p.sid}`);
  if (!container) {
    container = document.createElement('div');
    container.id = `v-${p.sid}`;
    container.className = 'video-tile';
    container.innerHTML = `
      <div class="info">${p.identity === lkRoom.localParticipant.identity ? '我' : p.identity}</div>
      <div class="mic-off"><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M1 1l22 22M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/></svg></div>
    `;
    $('vgrid').appendChild(container);
  }
  const videoEl = (track || p.getTrackPublication(Track.Source.Camera)?.videoTrack)?.attach();
  if (videoEl) {
    container.querySelectorAll('video').forEach(v=>v.remove());
    container.appendChild(videoEl);
  }
  updateGrid();
}

/**
 * Optimized Grid Algorithm
 * 解決 3 人、5 人時的排版問題
 */
function updateGrid() {
  const grid = $('vgrid'); if(!grid) return;
  const tiles = Array.from(grid.querySelectorAll('.video-tile'));
  const n = tiles.length;
  if(n === 0) return;

  let cols = 1, rows = 1;
  if (n === 2) { cols = 2; rows = 1; }
  else if (n <= 4) { cols = 2; rows = 2; }
  else if (n <= 6) { cols = 3; rows = 2; }
  else if (n <= 9) { cols = 3; rows = 3; }
  else { cols = 4; rows = Math.ceil(n / 4); }

  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  // 特別優化：奇數人數時，最後一人置中
  tiles.forEach((tile, i) => {
    tile.style.gridColumn = '';
    if (n === 3 && i === 2) {
      tile.style.gridColumn = `1 / span 2`;
    } else if (n === 5 && i === 4) {
      tile.style.gridColumn = `1 / span 3`;
    }
  });
}

function leaveRoom() {
  if(lkRoom) { lkRoom.disconnect(); lkRoom = null; }
  S.inMeeting = false;
  $('vgrid').innerHTML = '';
  showScreen('lobby');
}

// Sidebars
function toggleBar(type) {
  const chat = $('m-chat'), set = $('m-set');
  if(type === 'chat') {
    chat.classList.toggle('open');
    set.classList.remove('open');
  } else {
    set.classList.toggle('open');
    chat.classList.remove('open');
  }
}

// Chat
$('i-chat').onkeyup = e => {
  if(e.key === 'Enter') {
    const txt = $('i-chat').value.trim();
    if(!txt || !lkRoom) return;
    lkRoom.localParticipant.publishData(new TextEncoder().encode(txt), { reliable: true });
    appendChat('我', txt, true);
    $('i-chat').value = '';
  }
};

function appendChat(name, text, me) {
  const el = document.createElement('div');
  el.className = `chat-msg ${me ? 'me' : ''}`;
  el.innerHTML = `<div class="name">${esc(name)}</div><div class="text">${esc(text)}</div>`;
  $('chat-list').appendChild(el);
  $('chat-list').scrollTop = $('chat-list').scrollHeight;
}

// Clock
setInterval(() => {
  const el = $('lobby-time');
  if(el && $('s-lobby').classList.contains('active')) {
    const n = new Date();
    el.textContent = n.toLocaleTimeString('zh-TW', { hour12: false });
  }
}, 1000);

// Buttons
$('btn-cam').onclick = async () => {
  const enabled = !lkRoom.localParticipant.isCameraEnabled;
  await lkRoom.localParticipant.setCameraEnabled(enabled);
  $('btn-cam').classList.toggle('off', !enabled);
};
$('btn-mic').onclick = async () => {
  const enabled = !lkRoom.localParticipant.isMicrophoneEnabled;
  await lkRoom.localParticipant.setMicrophoneEnabled(enabled);
  $('btn-mic').classList.toggle('off', !enabled);
};
</script>
</body>
</html>
