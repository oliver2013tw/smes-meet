<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SMES-MEET</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 引入 LiveKit 與 Firebase 的預載入 (可選) -->
</head>
<body>
    <div id="os-root">
        <!-- 頂部狀態列 -->
        <header class="sys-bar">
            <div class="tag">SMES_CORE_V8.5</div>
            <div id="net-indicator" class="info">SIGNAL: INITIALIZING...</div>
            <div id="clock" class="clock">00:00:00</div>
        </header>

        <!-- 主要視訊區域 -->
        <main id="video-stage" class="grid-stage"></main>

        <!-- 診斷浮層 -->
        <div id="diag-overlay" class="diag-panel"></div>

        <!-- 底部控制儀表板 -->
        <footer class="dash-bar">
            <button class="d-btn" data-action="mic">AUDIO</button>
            <button class="d-btn" data-action="cam">VIDEO</button>
            <button class="d-btn" data-action="share">SHARE</button>
            <div class="spacer"></div>
            <button class="d-btn danger" data-action="exit">TERMINATE</button>
        </footer>
    </div>

    <!-- 登入屏障 -->
    <section id="scr-auth" class="overlay-screen active">
        <div class="auth-card">
            <h1>SMES-MEET</h1>
            <p>// PROFESSIONAL INDUSTRIAL SFU</p>
            <button id="btn-login" class="os-btn">AUTH_WITH_GOOGLE</button>
        </div>
    </section>

    <!-- 載入模組 -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
